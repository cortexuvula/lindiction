name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish release binary
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libclang-dev libasound2-dev libpulse-dev libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked --version "^2"

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package tarball
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          cd target/release
          tar -czf "../../lindiction-${REF_NAME}-x86_64-linux.tar.gz" lindiction
          cd ../..
          sha256sum "lindiction-${REF_NAME}-x86_64-linux.tar.gz" > "lindiction-${REF_NAME}-x86_64-linux.tar.gz.sha256"

      - name: Build .deb
        run: cargo deb --no-build

      - name: Rename .deb to include tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # cargo-deb names the file from Cargo.toml's version;
          # prefer a tag-based name for the release attachment.
          cp target/debian/lindiction_*_amd64.deb "./lindiction-${REF_NAME}-amd64.deb"
          # Publish a SHA256 sidecar alongside the .deb so the auto-updater
          # (see src/update.rs) can verify integrity the same way it does
          # for the tarball. Defense-in-depth: HTTPS + GitHub already cover
          # transport, but this catches storage bit-rot and keeps verification
          # consistent across install methods.
          sha256sum "lindiction-${REF_NAME}-amd64.deb" > "lindiction-${REF_NAME}-amd64.deb.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${REF_NAME}" \
            --title "${REF_NAME}" \
            --generate-notes \
            "lindiction-${REF_NAME}-x86_64-linux.tar.gz" \
            "lindiction-${REF_NAME}-x86_64-linux.tar.gz.sha256" \
            "lindiction-${REF_NAME}-amd64.deb" \
            "lindiction-${REF_NAME}-amd64.deb.sha256"
